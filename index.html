<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Configuración crucial para que se comporte como app nativa en el celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Horas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <style>
    body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TARIFA_HORA = 25;
    // Tasas estimadas de deducción
    const TASAS_IMPUESTOS = { fica: 0.0765, federal: 0.10, nyState: 0.045, nySdiPfl: 0.005 };

    function App() {
      // Estado inicializado desde localStorage para persistencia de datos
      const [entradas, setEntradas] = useState(() => JSON.parse(localStorage.getItem('registros_tiempo') || '[]'));
      const [entradaActual, setEntradaActual] = useState(() => localStorage.getItem('entrada_actual'));

      useEffect(() => {
        localStorage.setItem('registros_tiempo', JSON.stringify(entradas));
        if (entradaActual) localStorage.setItem('entrada_actual', entradaActual);
        else localStorage.removeItem('entrada_actual');
      }, [entradas, entradaActual]);

      const marcarEntrada = () => setEntradaActual(new Date().toISOString());
      
      const marcarSalida = () => {
        if (!entradaActual) return;
        const nuevaEntrada = { id: Date.now(), entrada: entradaActual, salida: new Date().toISOString() };
        setEntradas([...entradas, nuevaEntrada]);
        setEntradaActual(null);
      };

      const borrarHistorial = () => {
        if(confirm("¿Seguro que deseas borrar todos los registros?")) setEntradas([]);
      };

      const resetearHoras = () => {
        if (confirm("¿Deseas resetear todas las horas y la entrada actual? Esto no se puede deshacer.")) {
          setEntradas([]);
          setEntradaActual(null);
          localStorage.removeItem('registros_tiempo');
          localStorage.removeItem('entrada_actual');
        }
      };

      // Cálculos de tiempo
      const horasHoy = entradas
        .filter(r => new Date(r.entrada).toDateString() === new Date().toDateString())
        .reduce((total, r) => total + (new Date(r.salida) - new Date(r.entrada)) / 3600000, 0);

      // Para el ejemplo, agrupamos las horas totales registradas. 
      // En una versión más compleja, podrías filtrar por la semana actual.
      const horasTotales = entradas.reduce((total, r) => total + (new Date(r.salida) - new Date(r.entrada)) / 3600000, 0); 
      
      const calcularPagoNeto = (horas) => {
        const bruto = horas * TARIFA_HORA;
        const totalPorcentajeImpuestos = Object.values(TASAS_IMPUESTOS).reduce((a, b) => a + b, 0);
        const deducciones = bruto * totalPorcentajeImpuestos;
        return { bruto, deducciones, neto: bruto - deducciones };
      };

      const pago = calcularPagoNeto(horasTotales);

      return (
        <div className="max-w-md mx-auto p-4 space-y-6 font-sans">
          <h1 className="text-3xl font-bold text-center text-gray-800 mt-4">⏱️ Tracker</h1>
          
          <div className="bg-white p-6 rounded-2xl shadow-sm text-center border border-gray-100">
            <p className="text-sm text-gray-500 mb-4 font-medium uppercase tracking-wider">
              {entradaActual ? "🟢 Turno Activo" : "🔴 Fuera de Turno"}
            </p>
            {!entradaActual ? (
              <button onClick={marcarEntrada} className="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform transform active:scale-95 text-lg">
                Marcar Entrada
              </button>
            ) : (
              <button onClick={marcarSalida} className="w-full bg-red-500 active:bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg transition-transform transform active:scale-95 text-lg">
                Marcar Salida
              </button>
            )}
            {entradaActual && (
              <p className="mt-4 text-xs text-gray-400">Entraste a las: {new Date(entradaActual).toLocaleTimeString()}</p>
            )}
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm space-y-3 border border-gray-100">
            <h2 className="font-bold text-gray-800 text-lg border-b pb-2">Resumen de Tiempo</h2>
            <div className="flex justify-between text-gray-600"><span>Horas Hoy:</span> <b className="text-gray-900">{horasHoy.toFixed(2)} hrs</b></div>
            <div className="flex justify-between text-gray-600"><span>Horas Acumuladas:</span> <b className="text-gray-900">{horasTotales.toFixed(2)} hrs</b></div>
          </div>

          <div className="bg-gradient-to-br from-green-50 to-emerald-100 p-6 rounded-2xl shadow-sm space-y-3 border border-green-200">
            <h2 className="font-bold text-green-900 text-lg border-b border-green-200 pb-2">Estimación de Pago ($25/hr)</h2>
            <div className="flex justify-between text-green-800"><span>Bruto Total:</span> <span>${pago.bruto.toFixed(2)}</span></div>
            <div className="flex justify-between text-red-600 text-sm"><span>Deducciones (NY + Fed):</span> <span>-${pago.deducciones.toFixed(2)}</span></div>
            <div className="flex justify-between font-black text-green-700 mt-2 text-xl"><span>Neto a Recibir:</span> <span>${pago.neto.toFixed(2)}</span></div>
          </div>

          {entradas.length > 0 && (
            <button onClick={borrarHistorial} className="w-full text-gray-400 text-sm py-2 underline">
              Reiniciar semana (Borrar datos)
            </button>
          )}

          {(entradas.length > 0 || entradaActual) && (
            <button onClick={resetearHoras} className="w-full text-gray-600 text-sm py-2 underline">
              Resetear horas (vaciar contador)
            </button>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
